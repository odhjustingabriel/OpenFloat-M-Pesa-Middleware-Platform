global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: openfloat-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: openfloat-auth
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: openfloat-erp-connector
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
