apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-security-defaults
  namespace: openfloat
data:
  security-context.yaml: |
    # Standard Non-Root Container Security Context
    securityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

  resource-limits.yaml: |
    # Production Pod CPU & Memory Constraints
    core:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "1536Mi"
    gateway:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "768Mi"
    auth:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    erp-connector:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
