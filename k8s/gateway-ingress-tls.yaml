apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@openfloat.co.ke
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openfloat-gateway-ingress
  namespace: openfloat
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.openfloat.co.ke
        - auth.openfloat.co.ke
        - portal.openfloat.co.ke
      secretName: openfloat-tls-cert
  rules:
    - host: api.openfloat.co.ke
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openfloat-gateway-service
                port:
                  number: 8443
    - host: portal.openfloat.co.ke
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openfloat-staff-portal-service
                port:
                  number: 3000
