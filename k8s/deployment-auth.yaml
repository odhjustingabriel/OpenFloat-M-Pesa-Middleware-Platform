apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfloat-auth
  namespace: openfloat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openfloat-auth
  template:
    metadata:
      labels:
        app: openfloat-auth
    spec:
      containers:
        - name: openfloat-auth
          image: openfloat/openfloat-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: openfloat-config
            - secretRef:
                name: openfloat-secrets
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 20
