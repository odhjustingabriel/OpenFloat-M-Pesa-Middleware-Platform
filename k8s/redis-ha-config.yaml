apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-ha-config
  namespace: openfloat
data:
  redis.conf: |
    # Production Redis Persistence Configuration
    port 6379
    protected-mode yes
    requirepass ${REDIS_PASSWORD}

    # Append Only Mode (AOF) for durably persisting rate limits & token caches
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # Memory Limits & Eviction Policy
    maxmemory 2gb
    maxmemory-policy volatile-lru

    # RDB Snapshot Fallback
    save 900 1
    save 300 10
    save 60 10000

    tcp-keepalive 300
    timeout 0
