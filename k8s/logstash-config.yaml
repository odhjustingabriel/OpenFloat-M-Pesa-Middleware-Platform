apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: openfloat
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline

  openfloat-pipeline.conf: |
    input {
      beats {
        port => 5044
        codec => json
      }
      tcp {
        port => 5000
        codec => json_lines
      }
    }

    filter {
      if [application] == "openfloat-core" or [application] == "openfloat-gateway" {
        json {
          source => "message"
          target => "log_data"
          skip_on_invalid_json => true
        }

        # Redact sensitive M-Pesa payload fields
        mutate {
          gsub => [
            "message", "(\"InitiatorPassword\":\s*\")[^\"]+(\")", "\1[REDACTED]\2",
            "message", "(\"SecurityCredential\":\s*\")[^\"]+(\")", "\1[REDACTED]\2"
          ]
        }

        # Tag audit chain verification log entries for SIEM
        if [logger_name] =~ "AuditChainService" {
          mutate {
            add_tag => [ "audit_chain_event", "siem_monitored" ]
          }
        }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch-prod.internal:9200"]
        index => "openfloat-logs-%{+YYYY.MM.dd}"
        user => "${ELASTIC_USER:elastic}"
        password => "${ELASTIC_PASSWORD}"
      }
    }
